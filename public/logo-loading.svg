<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="loadingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .spinner {
        animation: spin 3s linear infinite;
        transform-origin: 100px 100px;
      }
      .pulse {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background circle -->\n  <circle cx="100" cy="100" r="95" fill="white" stroke="url(#loadingGradient)" stroke-width="2" opacity="0.2"/>
  \n  <!-- Rotating house icon -->\n  <g class="spinner">
    <path d="M 100 30 C 130 50 140 60 125 75 L 75 75 C 60 60 70 50 100 30" fill="url(#loadingGradient)"/>
    <rect x="60" y="75" width="80" height="65" fill="url(#loadingGradient)" opacity="0.8" rx="6"/>
    <rect x="82" y="100" width="36" height="45" fill="#ffffff" stroke="url(#loadingGradient)" stroke-width="2" rx="4" opacity="0.9"/>
    <circle cx="113" cy="122" r="2.5" fill="url(#loadingGradient)"/>
    <rect x="68" y="85" width="16" height="16" fill="#e0f2fe" stroke="url(#loadingGradient)" stroke-width="1.5" rx="3"/>
    <rect x="116" y="85" width="16" height="16" fill="#e0f2fe" stroke="url(#loadingGradient)" stroke-width="1.5" rx="3"/>
  </g>
  \n  <!-- Pulsing outer circle -->\n  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#loadingGradient)" stroke-width="2" opacity="0.3" class="pulse"/>
  \n  <!-- Loading text -->\n  <text x="100" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="url(#loadingGradient)" text-anchor="middle">Loading...</text>
</svg>"